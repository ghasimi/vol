<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">	
		 <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
		<link rel="stylesheet" href="./assets/style.css">
	</head>
	<body>
		<h1>Stochastic Volatility Inspired (SVI)</h1>

		<div id="plotDiv"></div>
		
		<img alt="SVI equation"
			src="./assets/svi-equation.png" width="300" 
			style="display: block; margin: auto; margin-bottom: 20px;" />

		<div>
			<div>
				<label>a</label>
				<input id="aInp" type="range" min="-100" max="100" value="0" />
				<span>vertical shift</span>
			</div>
			<div>
				<label>b</label>
				<input id="bInp" type="range" min="0" max="200" value="100" />
				<span>slope</span>
			</div>
			<div>
				<label>ρ</label>
				<input id="rhoInp" type="range" min="-1000" max="1000" value="-100" />
				<span>skew</span>
			</div>		
			<div>
				<label>m</label>
				<input id="mInp" type="range" min="-100" max="100" value="0" />
				<span>horizontal shift</span>
			</div>	
			<div>
				<label>σ</label>
				<input id="sigInp" type="range" min="0" max="140" value="70" />
				<span>ATM curvature</span>
			</div>	
			<div>
				<label>DTE</label>
				<input id="dteInp" type="range" min="0" max="365" value="30" />
				<span>Days to Expiry</span>
			</div>											
		</div>
		
		<div style="margin-top: 50px;">
			<p>
				SVI 
				<a href="https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2033323">reference</a>
			</p>
			
			<p>
				<a style="display: inline-flex; align-items: center; color:rgb(30,50,80)"
					href="https://github.com/ghasimi/vol">
					<img style="margin-right: 10px;"
						class="icon" src="./assets/icon-github.svg" width="30"/>
					github.com/ghasimi/vol
				</a>				 
			</p> 
		</div>
		
		<script src="./assets/svi.js"></script>
	</body>
</html>
